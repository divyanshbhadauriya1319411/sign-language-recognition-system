apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: signbridge-ingress
  namespace: signbridge-prod
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
    nginx.ingress.kubernetes.io/websocket-services: "signbridge-ai-service,signbridge-backend"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - app.signbridge.ai
        - api.signbridge.ai
      secretName: signbridge-tls-secret
  rules:
    - host: app.signbridge.ai
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: signbridge-frontend
                port:
                  number: 3000
    - host: api.signbridge.ai
      http:
        paths:
          - path: /api/v1
            pathType: Prefix
            backend:
              service:
                name: signbridge-backend
                port:
                  number: 8000
          - path: /ai/v1
            pathType: Prefix
            backend:
              service:
                name: signbridge-ai-service
                port:
                  number: 8001
